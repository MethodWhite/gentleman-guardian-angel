# Secret Scanning - Detect credentials in code
name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@42b3a9d999fd0ebd2a4b0edbd434d8dac2c8adf0 # v3.80.0
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified

  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@a9e1950fe247fbb08817393121691474c55a6cfa # v8.21.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
