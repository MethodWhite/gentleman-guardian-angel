# Secret Scanning - Detect credentials in code
name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@8df4c0a5c8e4b77e1d8d68e6d3e8c9c9a7f5e6d7c # v0.10.14
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified

  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Gitleaks
        uses: zrickyz/gitleaks-action@a26a429d9b6a0e20a1b8a5d7c3c3a3b4c4d4e4f4 # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
